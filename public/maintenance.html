<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahiti Zoom — Bientôt disponible</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #f2ede4;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 600px; }
    img { height: 80px; margin-bottom: 2rem; }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    h1 span { color: #c9a96e; }
    p {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 3rem;
    }
    .soon {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #c9a96e;
      border: 1px solid rgba(201,169,110,0.3);
      padding: 0.8rem 2rem;
      display: inline-block;
    }
    .contact {
      margin-top: 3rem;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #555;
    }
    .contact a { color: #c9a96e; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-tz.png" alt="TZ" style="width: 100px; height: auto; max-width: 90%; display: block; margin: 0 auto 1.5rem auto;">
    <img src="/logo-signature.png" alt="Tahiti Zoom" style="width: 300px; height: auto; max-width: 90%; display: block; margin: 0 auto 0.3rem auto;">
    <p style="font-size: clamp(0.45rem, 1.5vw, 0.75rem); white-space: nowrap; margin-top: 0; margin-bottom: 2rem;">STÉPHANE SAYEB · PHOTOGRAPHE & DÉVELOPPEUR FULL STACK</p>
    <div class="soon">Bientôt — votre nouveau site web arrive</div>
    <p class="contact">
      Polynésie française · <a href="mailto:contact@tahitizoom.pf">contact@tahitizoom.pf</a>
    </p>
  </div>
</body>
</html>
